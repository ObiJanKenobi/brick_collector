<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="1" stop-color="#0F0F0F"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7C22"/>
      <stop offset="1" stop-color="#EE5A00"/>
    </linearGradient>
    <radialGradient id="stud" cx="0.36" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#FFC08A"/>
      <stop offset="0.45" stop-color="#FF7C22"/>
      <stop offset="1" stop-color="#DD5200"/>
    </radialGradient>
  </defs>

  <!-- dark rounded tile -->
  <rect x="6" y="6" width="116" height="116" rx="27" fill="url(#bg)"/>
  <rect x="7" y="7" width="114" height="114" rx="26" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- brick body (top-down) -->
  <rect x="24" y="24" width="80" height="80" rx="16" fill="url(#brick)"/>
  <!-- soft bottom shading for a little depth -->
  <rect x="24" y="82" width="80" height="22" rx="16" fill="#000000" fill-opacity="0.10"/>

  <!-- 2x2 studs -->
  <g stroke="#B84600" stroke-opacity="0.55" stroke-width="1.5">
    <circle cx="46" cy="46" r="13" fill="url(#stud)"/>
    <circle cx="82" cy="46" r="13" fill="url(#stud)"/>
    <circle cx="46" cy="82" r="13" fill="url(#stud)"/>
    <circle cx="82" cy="82" r="13" fill="url(#stud)"/>
  </g>
</svg>
